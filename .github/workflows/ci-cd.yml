name: CI / CD — MHHCHECKER

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── 1. Backend Tests ────────────────────────────────────────────────────────
  test-backend:
    name: 🧪 Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      # Run Jest and capture output — even on failure
      - name: Run Jest tests (capture log)
        working-directory: backend
        id: jest
        run: |
          set +e
          npm test 2>&1 | tee ../test-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
          set -e

      # Always upload the log so the AI fix job can download it
      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-failure-log
          path: test-output.txt

      # Fail the job if tests actually failed
      - name: Fail if tests failed
        if: steps.jest.outputs.exit_code != '0'
        run: |
          echo "❌ Jest exited with code ${{ steps.jest.outputs.exit_code }}"
          exit 1

  # ── 2. Frontend Build ───────────────────────────────────────────────────────
  build-frontend:
    name: 🏗️ Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  # ── 3. AI Auto-Fix (only when backend tests fail) ──────────────────────────
  ai-auto-fix:
    name: 🤖 AI Auto-Fix
    runs-on: ubuntu-latest
    needs: test-backend
    # Trigger only when tests fail on a direct push (not on PRs to avoid loops)
    if: |
      failure() &&
      github.event_name == 'push' &&
      !startsWith(github.ref, 'refs/heads/ai-fix/')
    permissions:
      contents: write        # push a new branch
      pull-requests: write   # open a PR

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download test failure log
        uses: actions/download-artifact@v4
        with:
          name: test-failure-log
          path: /tmp/ci-logs

      - name: Run AI auto-fix script
        id: ai_fix
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TEST_LOG_PATH: /tmp/ci-logs/test-output.txt
        run: node .github/scripts/ai-fix.js

      - name: Create branch and open PR
        if: steps.ai_fix.outcome == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="ai-fix/$(date +%Y%m%d-%H%M%S)"
          FAILED_SHA="${{ github.sha }}"
          FAILED_BRANCH="${{ github.ref_name }}"

          git config user.name  "AI Auto-Fix Bot"
          git config user.email "actions@github.com"

          # Only proceed if AI actually changed something
          if git diff --quiet; then
            echo "⚠️  No file changes detected — skipping PR."
            exit 0
          fi

          git checkout -b "$BRANCH"
          git add -A
          git commit -m "fix(ai-auto-fix): automated repair of failing CI tests

AI analysed the Jest failure on commit ${FAILED_SHA::7} (branch: ${FAILED_BRANCH})
and applied a fix to the implementation files.

Co-authored-by: Claude AI <claude@anthropic.com>"

          git push origin "$BRANCH"

          gh pr create \
            --title "🤖 AI Auto-Fix: Repair failing backend tests" \
            --body "## 🤖 Automated Fix by Claude AI

This PR was created automatically because \`test-backend\` failed on branch \`${FAILED_BRANCH}\` (commit \`${FAILED_SHA::7}\`).

---

### What happened
Jest tests failed in CI. The AI Auto-Fix bot analysed the failure log and the implementation files, then generated a fix.

### ⚠️  Before merging — please verify
- [ ] The diff is logically correct (not just deleting the failing assertion)
- [ ] No test file was modified to \"cheat\" past a real bug
- [ ] CI passes on this PR's branch
- [ ] No security issues were introduced

---
*Generated by \`.github/scripts/ai-fix.js\` · Model: claude-opus-4-5*" \
            --base main \
            --head "$BRANCH"

          echo "✅ PR created: $BRANCH"

  # ── 4. Deploy to Vercel ─────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build project (Vercel)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}