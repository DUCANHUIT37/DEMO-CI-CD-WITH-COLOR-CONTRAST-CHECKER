name: CI / CD — MHHCHECKER

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Huỷ run cũ khi có push mới trên cùng branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── 1. Backend Tests ──────────────────────────────────────────────────────────
  test-backend:
    name: 🧪 Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run Jest tests (capture log)
        working-directory: backend
        id: jest
        run: |
          set +e
          npm test 2>&1 | tee ../test-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
          set -e

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-failure-log
          path: test-output.txt

      - name: Fail if tests failed
        if: steps.jest.outputs.exit_code != '0'
        run: |
          echo "❌ Jest exited with code ${{ steps.jest.outputs.exit_code }}"
          exit 1

  # ── 2. Frontend Build ─────────────────────────────────────────────────────────
  build-frontend:
    name: 🏗️ Frontend Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  # ── 3. Dependency Review (PRs only) ──────────────────────────────────────────
  dependency-review:
    name: 🔒 Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  # ── 4. AI Agentic Fix ────────────────────────────────────────────────────────
  ai-agent-fix:
    name: 🤖 AI Agentic Fix
    runs-on: ubuntu-latest
    needs: test-backend
    if: |
      failure() &&
      github.event_name == 'push' &&
      !startsWith(github.ref, 'refs/heads/ai-fix/')
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Download test failure log
        uses: actions/download-artifact@v4
        with:
          name: test-failure-log
          path: /tmp/ci-logs

      - name: Run AI agentic fix loop
        id: agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TEST_LOG_PATH: /tmp/ci-logs/test-output.txt
        run: node .github/scripts/ai-agent-fix.js

      - name: Create branch and open PR
        if: steps.agent.outcome == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="ai-fix/$(date +%Y%m%d-%H%M%S)"
          FAILED_SHA="${{ github.sha }}"
          FAILED_BRANCH="${{ github.ref_name }}"

          git config user.name  "AI Agent Fix Bot"
          git config user.email "actions@github.com"

          if git diff --quiet; then
            echo "⚠️ No file changes — skipping PR."
            exit 0
          fi

          git checkout -b "$BRANCH"
          git add -A
          git commit \
            -m "fix(ai-agent): agentic repair of CI tests" \
            -m "Agent self-verified fix by running npm test inside the runner." \
            -m "Original failure on ${FAILED_BRANCH} @ ${FAILED_SHA}"

          git push origin "$BRANCH"

          cat > /tmp/pr-body.md << 'PRBODY'
## 🤖 Agentic Fix by Claude AI

This PR was created automatically after the agentic fix agent
verified the fix passes all tests.

### How the agent worked
Unlike a one-shot fix, the agent ran in a multi-turn loop:
1. Read the source files to understand the code
2. Applied a fix via write_file
3. Ran npm test inside the CI runner to verify
4. Iterated if needed until all tests passed
5. Called finish(success=true) only after tests pass

### Before merging
- [ ] Review the diff — confirm logic is correct
- [ ] Confirm no test was weakened or removed
- [ ] Check this PR's own CI is green

Generated by .github/scripts/ai-agent-fix.js
PRBODY

          gh pr create \
            --title "🤖 AI Agent Fix: Repair failing backend tests" \
            --body-file /tmp/pr-body.md \
            --base main \
            --head "$BRANCH"

          echo "✅ PR created: $BRANCH"

  # ── 5. Deploy to Vercel ───────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build project (Vercel)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ── 6. AI Pipeline Optimizer ─────────────────────────────────────────────────
  ai-optimize-pipeline:
    name: ⚙️ AI Pipeline Optimizer
    runs-on: ubuntu-latest
    needs: deploy
    if: |
      success() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check if optimization PR already exists
        id: check_pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COUNT=$(gh pr list --head "ai-optimize/" --state open --json number --jq length)
          echo "open_count=$COUNT" >> $GITHUB_OUTPUT

      - name: Run AI pipeline optimizer
        id: optimizer
        if: steps.check_pr.outputs.open_count == '0'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node .github/scripts/ai-optimize-pipeline.js

      - name: Create optimization PR
        if: steps.optimizer.outcome == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="ai-optimize/$(date +%Y%m%d)"

          git config user.name  "AI Pipeline Optimizer"
          git config user.email "actions@github.com"

          if git diff --quiet; then
            echo "✅ Pipeline already optimal — no PR needed."
            exit 0
          fi

          SUMMARY=$(cat /tmp/optimization-summary.txt 2>/dev/null || echo "See diff for details")

          git checkout -b "$BRANCH"
          git add .github/workflows/ci-cd.yml
          git commit \
            -m "perf(ci): AI-optimized pipeline configuration" \
            -m "$SUMMARY"

          git push origin "$BRANCH"

          cat > /tmp/pr-optimizer.md << PRBODY
## AI Pipeline Optimization

Claude analyzed the current ci-cd.yml and found the following improvements:

### Changes
$SUMMARY

### Before merging
- Review the YAML diff carefully
- Confirm all existing jobs are still present
- Test by triggering the pipeline manually after merge

Generated by .github/scripts/ai-optimize-pipeline.js
PRBODY

          gh pr create \
            --title "⚙️ AI Pipeline Optimization: Improve ci-cd.yml" \
            --body-file /tmp/pr-optimizer.md \
            --base main \
            --head "$BRANCH"

          echo "✅ Optimization PR created: $BRANCH"